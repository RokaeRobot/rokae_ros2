# MoveIt uses this configuration for controller management

# moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

# moveit_simple_controller_manager:
#   controller_names:
#     - position_joint_trajectory_controller

#   position_joint_trajectory_controller:
#     type: FollowJointTrajectory
#     joints:
#       - xMateCR12_joint_1
#       - xMateCR12_joint_2
#       - xMateCR12_joint_3
#       - xMateCR12_joint_4
#       - xMateCR12_joint_5
#       - xMateCR12_joint_6
#     action_ns: follow_joint_trajectory
#     default: true

controller_names:
  - position_joint_trajectory_controller

position_joint_trajectory_controller:
    action_ns: follow_joint_trajectory
    type: FollowJointTrajectory
    default: True
    joints:
      - xMateCR12_joint_1
      - xMateCR12_joint_2
      - xMateCR12_joint_3
      - xMateCR12_joint_4
      - xMateCR12_joint_5
      - xMateCR12_joint_6
    constraints:
      goal_time: 20
      stopped_velocity_tolerance: 0.5
      joint1: {goal: 2.175}
      joint2: {goal: 2.175}
      joint3: {goal: 2.175}
      joint4: {goal: 2.175}
      joint5: {goal: 2.175}
      joint6: {goal: 2.175}
    stop_trajectory_duration: 0.5
    state_publish_rate: 100.0
    action_monitor_rate: 20.0