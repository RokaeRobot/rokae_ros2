    type: joint_trajectory_controller/JointTrajectoryController
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
    command_interfaces:
      - velocity
    state_interfaces:
      - position
      - velocity
    constraints:
      goal_time: 0.5
      stopped_velocity_tolerance: 0.05
      joint1: {goal: 0.05}
      joint2: {goal: 0.05}
      joint3: {goal: 0.05}
      joint4: {goal: 0.05}
      joint5: {goal: 0.05}
      joint6: {goal: 0.05}
    gains:
      joint1: {p: 500, i: 0.05, d: 0.1, i_clamp: 1}
      joint2: {p: 500, i: 0.05, d: 0.1, i_clamp: 1}
      joint3: {p: 500, i: 0.05, d: 0.1, i_clamp: 1}
      joint4: {p: 500, i: 0.05, d: 0.1, i_clamp: 1}
      joint5: {p: 500, i: 0.05, d: 0.1, i_clamp: 1}
      joint6: {p: 500, i: 0.05, d: 0.1, i_clamp: 1}
    stop_trajectory_duration: 0.5
    state_publish_rate: 100.0
    action_monitor_rate: 20.0

torque_joint_trajectory_controller:
  ros__parameters:
    type: joint_trajectory_controller/JointTrajectoryController
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
    command_interfaces:
