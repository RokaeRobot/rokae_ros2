name: Check no binary libraries in Git

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if prebuilt SDK libraries are tracked
        run: |
          patterns='\.(lib|dll|pdb|a|so)(\.[0-9]+.*)?$'
          tracked="$(git ls-files rokae_hardware/sdk/lib/ | grep -E "$patterns" || true)"
          if [ -n "$tracked" ]; then
            echo "Prebuilt xCore SDK libraries must not be committed to Git."
            echo "Download them from xCoreSDK-CPP GitHub Releases instead."
            echo "See rokae_hardware/sdk/lib/README.md"
            echo ""
            echo "Tracked binary files:"
            echo "$tracked"
            exit 1
          fi
          echo "OK: no binary libraries tracked under rokae_hardware/sdk/lib/"

      - name: Fail if Git LFS is configured for libraries
        run: |
          if [ -f .gitattributes ] && grep -q 'filter=lfs' .gitattributes; then
            echo "Git LFS must not be used for SDK libraries. Remove LFS rules from .gitattributes."
            exit 1
          fi
          echo "OK: no LFS rules for libraries"
