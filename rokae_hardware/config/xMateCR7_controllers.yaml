controller_manager:
  ros__parameters:
    use_sim_time: false
    update_rate: 1000

    # ↓↓↓↓ 已按要求添加这 3 行 ↓↓↓↓
    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
      
    position_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    velocity_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    torque_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_group_position_controller:
      type: position_controllers/JointGroupPositionController

# 新增：gazebo ros2_control 使用仿真时间
gazebo_ros2_control:
  ros__parameters:
    use_sim_time: true
    # (Optional) Some gazebo_ros2_control versions accept robot_description here.
    # Your actual robot_description is still provided via the URDF plugin tags.
    # robot_description is provided by robot_state_publisher/URDF plugin at launch time.
    controller_manager:
      update_rate: 1000

#注释可用
joint_state_broadcaster:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
# 新增：arm_controller（作业要求的控制器）
arm_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0

position_joint_trajectory_controller:
  ros__parameters:
    # type: joint_trajectory_controller/JointTrajectoryController
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    constraints:
      goal_time: 7.5
      stopped_velocity_tolerance: 0.1
      joint1: {goal: 0.1, trajectory: 0.2}    
      joint2: {goal: 0.1, trajectory: 0.2} 
      joint3: {goal: 0.1, trajectory: 0.2}
      joint4: {goal: 0.1, trajectory: 0.2}
      joint5: {goal: 0.1, trajectory: 0.2}
      joint6: {goal: 0.1, trajectory: 0.2}
    stop_trajectory_duration: 0.5
    state_publish_rate: 100.0
    action_monitor_rate: 20.0

velocity_joint_trajectory_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
    command_interfaces:
      - velocity
    state_interfaces:
      - position
      - velocity
    constraints:
      goal_time: 0.5
      stopped_velocity_tolerance: 0.05
      joint1: {goal: 0.05}
      joint2: {goal: 0.05}
      joint3: {goal: 0.05}
      joint4: {goal: 0.05}
      joint5: {goal: 0.05}
      joint6: {goal: 0.05}
    gains:
      joint1: {p: 500, i: 0.05, d: 0.1, i_clamp: 1}
      joint2: {p: 500, i: 0.05, d: 0.1, i_clamp: 1}
      joint3: {p: 500, i: 0.05, d: 0.1, i_clamp: 1}
      joint4: {p: 500, i: 0.05, d: 0.1, i_clamp: 1}
      joint5: {p: 500, i: 0.05, d: 0.1, i_clamp: 1}
      joint6: {p: 500, i: 0.05, d: 0.1, i_clamp: 1}
    stop_trajectory_duration: 0.5
    state_publish_rate: 100.0
    action_monitor_rate: 20.0

torque_joint_trajectory_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
    command_interfaces:
      - effort
    state_interfaces:
