# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    position_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

position_joint_trajectory_controller:
  ros__parameters:
    joints:
      - xMateER3_joint_1
      - xMateER3_joint_2
      - xMateER3_joint_3
      - xMateER3_joint_4
      - xMateER3_joint_5
      - xMateER3_joint_6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity